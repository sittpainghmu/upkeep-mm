        <h2 style="margin:0;font-size:20px;font-weight:700;line-height:1.2">${esc(job.title)}</h2>
        <div class="row" style="margin-top:8px;gap:8px">${priorityBadge(job.priority)}${statusBadge(job.status)}</div>
        <div class="row" style="margin-top:8px;font-size:12px;color:var(--onSurfaceVar);gap:6px">${icon("lock", 14, C.outline)} Reported ${esc(job.reportedAt)}</div>
      </div>
      ${infoCardHTML([
        ["Category", `${job.category[0]} → ${job.category[1]}`],
        ["Location", `${job.location} · ${job.floor}`],
        ["Asset", job.asset || "—"],
        ["Description", job.description],
      ])}
      <div class="card">
        <div class="label" style="margin-bottom:12px">Update Status</div>
        <div class="seg" data-seg="techStep">${steps.map((s) => `<button class="${s === state.techStep ? "on" : ""}" data-val="${s}">${s.replace("_", " ")}</button>`).join("")}</div>
        <div style="margin-top:12px"><textarea class="textarea" rows="3" placeholder="Add a note…"></textarea></div>
        <div style="margin-top:12px"><button class="btn-primary" data-action="statusUpdated">Update Status</button></div>
      </div>
      <div class="card">
        <div class="label" style="margin-bottom:12px">Photo Upload</div>
        <div class="checkitem ${state.preDone ? "on" : ""}" data-toggle="pre">${icon(state.preDone ? "check_box" : "check_box_outline_blank", 20, state.preDone ? "#15803d" : C.outline)} Pre-job photos uploaded</div>
        <div style="margin-top:12px"><button class="btn-secondary" data-action="uploadPre">${icon("photo_camera", 18, C.primary)}Upload Pre-job Photos</button></div>
        <div class="thumbs" style="margin-top:12px">${[1, 2].map((_) => `<div class="thumb"></div>`).join("")}</div>
        <div class="divider" style="margin:12px 0"></div>
        <div class="checkitem ${state.postDone ? "on" : ""}" data-toggle="post">${icon(state.postDone ? "check_box" : "check_box_outline_blank", 20, state.postDone ? "#15803d" : C.outline)} Post-job photos uploaded</div>
        <div style="margin-top:12px"><button class="btn-secondary" data-action="uploadPost">${icon("photo_camera", 18, C.primary)}Upload Post-job Photos</button></div>
      </div>
      <div class="card">
        <div class="label" style="margin-bottom:8px">Requester Photos</div>
        <div class="thumbs">${[1, 2, 3].map((_) => `<div class="thumb grad"></div>`).join("")}</div>
      </div>
    </div>
    <div class="action-bar"><button class="btn-primary" data-action="markDone">${icon("check_circle", 18, "#fff")}Mark as Done</button></div>
  </div>`;
      }

      function renderClientReqDetail(job) {
        const order = [
          "open",
          "acknowledged",
          "in_progress",
          "completed",
          "verified",
        ];
        const labels = [
          "Submitted",
          "Acknowledged",
          "In Progress",
          "Completed",
          "Verified",
        ];
        const cur = order.indexOf(job.status);
        return `<div class="screen active">
    ${topBar("Request Detail", true)}
    <div class="px stack" style="padding-bottom:24px">
      <div class="card">
        <div style="font-size:11px;font-weight:600;color:var(--outline)">#${esc(job.order)}</div>
        <h2 style="margin:4px 0 0;font-size:22px;font-weight:700;line-height:1.2">${esc(job.title)}</h2>
        <div class="row" style="margin-top:12px;gap:8px">${priorityBadge(job.priority)}${statusBadge(job.status)}</div>
        <div class="row" style="margin-top:12px;font-size:12px;color:var(--onSurfaceVar);gap:6px">${icon("lock", 14, C.outline)} Submitted ${esc(job.reportedAt)} · Auto-locked</div>
      </div>
      <div class="card">
        <div class="label" style="margin-bottom:12px">Status Timeline</div>
        ${labels.map((l, i) => tlStep(i < cur ? "done" : i === cur ? "current" : "pending", l, i <= cur ? "Today" : null, null, i === labels.length - 1)).join("")}
      </div>
      ${infoCardHTML([
        ["Category", `${job.category[0]} → ${job.category[1]}`],
        ["Location", `${job.location} · ${job.floor}`],
        ["Description", job.description],
      ])}
      ${job.vendor ? `<div class="card"><div class="label" style="margin-bottom:8px">Assigned Technician</div><div class="row" style="gap:12px"><div style="width:40px;height:40px;border-radius:999px;background:var(--primaryFixed);display:flex;align-items:center;justify-content:center">${icon("engineering", 20, C.onPrimaryFixed)}</div><div><div style="font-size:14px;font-weight:600">${esc(TECHNICIANS[0])}</div><div style="font-size:12px;color:var(--onSurfaceVar)">Technician · ${esc(job.vendor)}</div></div></div></div>` : ""}
      <div class="card">
        <div class="label" style="margin-bottom:8px">Your uploads</div>
        <div class="thumbs">${[1, 2].map((_) => `<div class="thumb"></div>`).join("")}</div>
        <div class="label" style="margin:12px 0 8px">Technician photos</div>
        <div class="thumbs">${[1, 2, 3].map((_) => `<div class="thumb grad"></div>`).join("")}</div>
      </div>
    </div>
  </div>`;
      }

      /* ============ Event binding ============ */
      function bind() {
        const root = document.getElementById("screens");
        root.querySelectorAll("[data-action]").forEach((el) => {
          el.addEventListener("click", () =>
            handleAction(el.dataset.action, el),
          );
        });
        root.querySelectorAll("[data-back]").forEach((el) =>
          el.addEventListener("click", () => {
            if (state.screen === "jobDetail") {
              state.screen = "shell";
              render();
            }
          }),
        );
        root.querySelectorAll("[data-role]").forEach((el) =>
          el.addEventListener("click", () => {
            state.role = el.dataset.role;
            state.tab =
              state.role === "admin"
                ? "jobs"
                : state.role === "technician"
                  ? "myjobs"
                  : "requests";
            state.screen = "shell";
            render();
          }),
        );
        root.querySelectorAll("[data-tab]").forEach((el) =>
          el.addEventListener("click", () => {
            state.tab = el.dataset.tab;
            render();
          }),
        );
        root.querySelectorAll("[data-job]").forEach((el) =>
          el.addEventListener("click", () => {
            state.currentJobId = el.dataset.job;
            state.prevTab = state.tab;
            state.screen = "jobDetail";
            state.collapsibles = { statusOpen: true, assignOpen: false };
            render();
          }),
        );
        root.querySelectorAll("[data-chips]").forEach((grp) => {
          const id = grp.dataset.chips;
          grp.querySelectorAll("[data-chip]").forEach((c) =>
            c.addEventListener("click", () => {
              const v = c.dataset.chip;
              if (id === "admin") state.adminFilter = v;
              else if (id === "tech") state.techFilter = v;
              else if (id === "client") state.clientFilter = v;
              render();
            }),
          );
        });
        root.querySelectorAll("[data-coll]").forEach((el) => {
          el.querySelector(".coll-head").addEventListener("click", () => {
            state.collapsibles[el.dataset.coll] =
              !state.collapsibles[el.dataset.coll];
            render();
          });
        });
        root.querySelectorAll("[data-seg]").forEach((seg) => {
          const name = seg.dataset.seg;
          seg.querySelectorAll("button").forEach((b) =>
            b.addEventListener("click", () => {
              seg
                .querySelectorAll("button")
                .forEach((x) => x.classList.remove("on"));
              b.classList.add("on");
              if (name === "techStep") state.techStep = b.dataset.val;
            }),
          );
        });
        root.querySelectorAll("[data-toggle]").forEach((el) =>
          el.addEventListener("click", () => {
            const k = el.dataset.toggle;
            if (k === "pre") state.preDone = !state.preDone;
            if (k === "post") state.postDone = !state.postDone;
            render();
          }),
        );
        // category dynamic sub-cat
        const adminCat = root.querySelector('[data-action="adminCat"]');
        if (adminCat)
          adminCat.addEventListener("change", (e) => {
            state.newCat = e.target.value;
            render();
          });
        const clientCat = root.querySelector('[data-action="clientCat"]');
        if (clientCat)
          clientCat.addEventListener("change", (e) => {
            state.clientNewCat = e.target.value;
            render();
          });
      }

      function handleAction(a) {
        switch (a) {
          case "togglePw":
            state.loginShowPw = !state.loginShowPw;
            render();
            break;
          case "signin":
            state.screen = "role";
            render();
            break;
          case "goLogin":
            state.screen = "login";
            render();
            break;
          case "signOut":
            state.screen = "login";
            state.role = null;
            render();
            break;
          case "switchRole":
            state.screen = "role";
            render();
            break;
          case "submitAdminJob":
            showToast("Job submitted");
            state.tab = "jobs";
            render();
            break;
          case "submitClientReq":
            showToast("Request submitted");
            state.tab = "requests";
            render();
            break;
          case "goNewReq":
            state.tab = "new";
            render();
            break;
          case "statusUpdated":
            showToast("Status updated");
            break;
          case "assignSaved":
            showToast("Assignment saved");
            break;
          case "uploadPre":
            state.preDone = true;
            showToast("Pre-job photos uploaded");
            render();
            break;
          case "uploadPost":
            state.postDone = true;
            showToast("Post-job photos uploaded");
            render();
            break;
          case "markDone":
            showToast("Marked as done");
            state.screen = "shell";
            render();
            break;
        }
      }

      /* ============ Boot ============ */
      state.screen = "login";
      render();
    </script>
  </body>
</html>
